services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nurix
      POSTGRES_PASSWORD: nurix
      POSTGRES_DB: nurix
    ports:
      - "${HOST_PG_PORT:-5442}:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U nurix -d nurix -c 'SELECT 1' >/dev/null"]
      interval: 2s
      timeout: 3s
      retries: 15

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://nurix:nurix@postgres:5432/nurix
      APP_PORT: "8000"
    env_file:
      - path: ./.env
        required: false
    ports:
      - "${HOST_APP_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
